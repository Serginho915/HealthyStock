services:
  env-setup:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: ["node", "scripts/setup-dev-env.mjs"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthystock
      POSTGRES_USER: healthystock
      POSTGRES_PASSWORD: healthystock
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthystock -d healthystock"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    image: healthystock-backend-dev
    build:
      context: ./backend
      target: dev
    env_file:
      - path: ./backend/.env
        format: raw
        required: false
    environment:
      DATABASE_URL: postgres://healthystock:healthystock@postgres:5432/healthystock
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      env-setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:4000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  admin-seed:
    image: healthystock-backend-dev
    env_file:
      - path: ./backend/.env
        format: raw
        required: false
    environment:
      DATABASE_URL: postgres://healthystock:healthystock@postgres:5432/healthystock
      SUPERADMIN_PASSWORD: ${LOCAL_SUPERADMIN_PASSWORD:-MySecretPassword123!}
    command: ["npm", "run", "create-superadmin", "--", "${LOCAL_SUPERADMIN_EMAIL:-admin@healthystock.local}"]
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    image: healthystock-frontend-dev
    build:
      context: ./frontend
      target: dev
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      API_URL: http://backend:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      env-setup:
        condition: service_completed_successfully
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    name: healthystock_postgres_data
