services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthystock
      POSTGRES_USER: healthystock
      POSTGRES_PASSWORD: healthystock
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthystock -d healthystock"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: ./backend
      target: dev
    env_file:
      - path: ./backend/.env
        format: raw
    environment:
      DATABASE_URL: postgres://healthystock:healthystock@postgres:5432/healthystock
      REDIS_URL: redis://redis:6379
    volumes:
      - backend_node_modules:/app/node_modules
      - backend_data:/app/data
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:4000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file:
      - ./frontend/.env
    environment:
      API_URL: http://backend:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_node_modules:
  backend_data:
  frontend_node_modules:
  frontend_next:
