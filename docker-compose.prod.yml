services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthystock}
      POSTGRES_USER: ${POSTGRES_USER:-healthystock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before production deploy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthystock} -d ${POSTGRES_DB:-healthystock}"]
      interval: 10s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12

  backend:
    image: healthystock-backend-prod
    restart: unless-stopped
    build:
      context: ./backend
      target: prod
    env_file:
      - path: ./backend/.env.production
        format: raw
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-healthystock}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-healthystock}
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:4000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  frontend:
    image: healthystock-frontend-prod
    restart: unless-stopped
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL before production deploy}
    environment:
      VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL before production deploy}
    ports:
      - "8080:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    name: healthystock_prod_postgres_data
