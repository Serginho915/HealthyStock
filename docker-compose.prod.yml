services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthystock}
      POSTGRES_USER: ${POSTGRES_USER:-healthystock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before production deploy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthystock} -d ${POSTGRES_DB:-healthystock}"]
      interval: 10s
      timeout: 3s
      retries: 12

  backend:
    restart: unless-stopped
    build:
      context: ./backend
      target: prod
    env_file:
      - path: ./backend/.env
        format: raw
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-healthystock}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-healthystock}
    ports:
      - "4000:4000"
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:4000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL before production deploy}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?Set NEXT_PUBLIC_SITE_URL before production deploy}
    environment:
      API_URL: http://backend:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL before production deploy}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?Set NEXT_PUBLIC_SITE_URL before production deploy}
    ports:
      - "8080:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_data:
